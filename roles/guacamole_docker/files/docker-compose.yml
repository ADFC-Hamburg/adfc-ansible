networks:
  guacnetwork_compose:
    driver: bridge

services:
  guacd:
    container_name: guacd_compose
    image: guacamole/guacd:${GUACD_VERSION}
    networks:
      - guacnetwork_compose
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL","netstat -an | grep :4822 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - ${DATA_PATH:-.}/guacd-drive:/drive:rw,z
      - ${DATA_PATH:-.}/guacd-record:/var/lib/guacamole/recordings:rw,z

  database:
    container_name: postgres_guacamole_compose
    image: postgres:${POSTGRES_VERSION}
    networks:
      - guacnetwork_compose
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_USER: guacamole_user
    healthcheck:
      test:
        ["CMD-SHELL","pg_isready -U guacamole_user -d guacamole_db"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - ${DATA_PATH:-.}/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql:ro,z
      - ${DATA_PATH:-.}/postgres-data:/var/lib/postgresql:rw,Z

  guacamole:
    container_name: guacamole_compose
    group_add:
      - "1000"
    depends_on:
      guacd:
        condition: service_healthy
      database:
        condition: service_healthy
    image: guacamole/guacamole:${GUACAMOLE_VERSION}
    networks:
      - guacnetwork_compose
    restart: always
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_HOSTNAME: database
      POSTGRESQL_USERNAME: guacamole_user
      POSTGRESQL_PASSWORD: "${DB_PASSWORD}"
      WEBAPP_CONTEXT: ROOT
      RECORDING_ENABLED: "true"
      LDAP_ENABLED: "true"
      LDAP_HOSTNAME: "ucs-master.gst.hamburg.adfc.de"
      LDAP_USER_BASE_DN: 'cn=users,dc=hamburg,dc=adfc,dc=de'
      LDAP_GROUP_BASE_DN: 'cn=groups,dc=hamburg,dc=adfc,dc=de'
      LDAP_CONFIG_BASE_DN: 'cn=guacamole,dc=hamburg,dc=adfc,dc=de'
      LDAP_USER_SEARCH_FILTER: '(groups=cn=Domain Users,cn=groups,dc=hamburg,dc=adfc,dc=de)'
      LDAP_MEMBER_ATTRIBUTE: 'uniqueMember'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g
    ports:
      - 8080/tcp
    volumes:
      - ${DATA_PATH:-.}/guacd-record:/var/lib/guacamole/recordings:ro,z
      - ${DATA_PATH:-.}/branding-adfc-hh.jar:/etc/guacamole/extensions/branding-adfc-hh.jar:ro

  nginx:
   container_name: nginx_guacamole_compose
   restart: always
   image: nginx:${NGINX_VERSION}
   volumes:
   - ${DATA_PATH:-.}/nginx-templates:/etc/nginx/templates:ro
   - ${CERT_PATH:-./self.cert}:/etc/nginx/ssl/cert.pem:ro
   - ${CERT_KEY_PATH:-./self-ssl.key}:/etc/nginx/ssl/private.key:ro
   ports:
   - ${PORT}:443
   networks:
     - guacnetwork_compose

volumes:
  guacd-drive:
  guacd-record:
  postgres-data:
  nginx-templates:
