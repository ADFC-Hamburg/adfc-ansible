---
- name: Create base directory
  ansible.builtin.file:
    path: "{{ guacamole_docker_path }}"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Create directories for mounting to Docker containers
  ansible.builtin.file:
    path: "{{ guacamole_docker_path }}/{{ item }}"
    state: directory
    mode: "0777"
    owner: root
    group: root
  loop:
    - guacd-drive
    - guacd-record
    - postgres-data

- name: Copy Docker Compose file
  ansible.builtin.copy:
    dest: "{{ guacamole_docker_path }}/docker-compose.yml"
    src: docker-compose.yml
    mode: "0644"
    owner: root
    group: root

- name: Copy initdb file for postgres
  ansible.builtin.copy:
    dest: "{{ guacamole_docker_path }}/initdb.sql"
    src: initdb.sql
    mode: "0644"
    owner: root
    group: root

- name: Generate password for postgres
  ansible.builtin.copy:
    dest: "{{ guacamole_docker_path }}/.password"
    content: "{{ lookup('ansible.builtin.password', '/dev/null') }}"
    mode: "0600"
    owner: root
    group: root
    force: false

- name: Fetch password for postgres
  ansible.builtin.slurp:
    src: "{{ guacamole_docker_path }}/.password"
  register: guacamole_docker_password_slurp

- name: Download branding extension for Guacamole
  ansible.builtin.get_url:
    dest: "{{ guacamole_docker_path }}/branding-adfc-hh.jar"
    url: "https://github.com/ADFC-Hamburg/guacamole-branding/releases/download/{{ guacamole_docker_branding_version }}/branding-adfc-hh.jar"
    checksum: "{{ guacamole_docker_branding_checksum }}"
    mode: "0644"
    owner: root
    group: root
    force: true
  register: guacamole_docker_branding_result

- name: Create variables file for Docker Compose
  ansible.builtin.template:
    dest: "{{ guacamole_docker_path }}/.env"
    src: env.j2
    mode: "0600"
    owner: root
    group: root

- name: Stop and remove service
  ansible.builtin.command: 
    cmd: docker-compose down
    chdir: "{{ guacamole_docker_path }}"
  when: guacamole_docker_branding_result.changed
  register: guacamole_docker_down_result
  changed_when: "'... done' in guacamole_docker_down_result.stderr"

- name: Create and start service
  ansible.builtin.command: 
    cmd: docker-compose up --detach
    chdir: "{{ guacamole_docker_path }}"
  register: guacamole_docker_up_result
  changed_when: "'... done' in guacamole_docker_up_result.stderr"

- name: Create Apache File
  ansible.builtin.template:
    dest: "/etc/apache2/ucs-sites.conf.d/guacamole_ansible.conf"
    src: "apache.conf.j2"
    mode: "0644"
    owner: root
    group: root
  notify: Reload apache
